  # ════════════════════════════════════════
  # FAILURE ARCHIVE
  # ════════════════════════════════════════
  /failure-archive/search:
    get:
      tags: [FailureArchive]
      summary: Search failures
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: query
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
        - name: severity
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  failures:
                    type: array
                    items: { $ref: '#/components/schemas/FailureSearchResult' }
                  total: { type: integer }

  /failure-archive/insights:
    get:
      tags: [FailureArchive]
      summary: Get failure insights
      parameters:
        - name: days
          in: query
          schema: { type: integer, default: 30 }
      responses:
        '200':
          description: Failure insights
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FailureInsights' }

  /failure-archive/predictions:
    get:
      tags: [FailureArchive]
      summary: Get failure predictions
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
        - name: minOccurrences
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Predictions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/FailurePrediction' }

  /failure-archive/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [FailureArchive]
      summary: Get failure by ID
      responses:
        '200':
          description: Failure details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FailureSearchResult' }

  /failure-archive/{id}/comments:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [FailureArchive]
      summary: Get failure comments
      responses:
        '200':
          description: Comments
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      comments:
                        type: array
                        items: { $ref: '#/components/schemas/FailureComment' }
                      total: { type: integer }
    post:
      tags: [FailureArchive]
      summary: Add comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
      responses:
        '201':
          description: Comment added
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { $ref: '#/components/schemas/FailureComment' }

  /failure-archive/{id}/activity:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [FailureArchive]
      summary: Get activity feed
      parameters:
        - name: limit
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Activity feed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ActivityFeedItem' }

  /failure-archive/{id}/document-rca:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    put:
      tags: [FailureArchive]
      summary: Document root cause analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rootCause, solution]
              properties:
                rootCause: { type: string }
                solution: { type: string }
                tags: { type: array, items: { type: string } }
      responses:
        '200':
          description: RCA documented
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FailureSearchResult' }

