      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatRequest' }
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema: { type: string }

  /ai/confirm:
    post:
      tags: [AI]
      summary: Confirm or deny a pending action
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConfirmActionRequest' }
      responses:
        '200':
          description: Action resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: object, additionalProperties: true }
                  toolResult: { type: object, additionalProperties: true, nullable: true }

  /ai/sessions:
    get:
      tags: [AI]
      summary: List chat sessions
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ChatSession' }
    post:
      tags: [AI]
      summary: Create chat session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ChatSession' }

  /ai/sessions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [AI]
      summary: Get chat session with messages
      responses:
        '200':
          description: Session with messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    allOf:
                      - $ref: '#/components/schemas/ChatSession'
                      - type: object
                        properties:
                          messages:
                            type: array
                            items:
                              type: object
                              properties:
                                id: { type: string }
                                role: { type: string }
                                content: { type: string }
                                toolName: { type: string, nullable: true }
                                createdAt: { type: string, format: date-time }
    delete:
      tags: [AI]
      summary: Delete chat session
      responses:
        '200':
          description: Session deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }

