name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'package-lock.json'
      - '.health-baseline.json'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'scripts/**'
      - 'package-lock.json'
      - '.health-baseline.json'
      - '.github/workflows/backend-ci.yml'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/testops"
      JWT_SECRET: "test-jwt-secret-must-be-at-least-32-chars-long"
      JWT_REFRESH_SECRET: "test-jwt-refresh-secret-must-be-at-least-32-chars-long"
      PORT: 3000

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Architecture and health checks
      working-directory: .
      run: |
        npm run check:architecture &
        npm run check:health &
        wait

    - name: Lint and typecheck
      run: |
        npm run lint &
        npm run typecheck &
        wait

    - name: Run tests
      run: npm test

    - name: Schema parity check (model + field level)
      working-directory: .
      run: node scripts/validate-schema.js --strict-fields

    - name: Typecheck with production schema (PostgreSQL enums)
      run: |
        cp prisma/schema.production.prisma prisma/schema.prisma
        npx prisma generate
        npm run typecheck

    - name: Typecheck with dev schema (SQLite / demo mode)
      run: |
        cp prisma/schema.dev.prisma prisma/schema.prisma
        npx prisma generate
        npm run typecheck

    - name: Security audit (fail on high severity)
      run: |
        npm audit --audit-level=high &
        (cd .. && npm audit --audit-level=high) &
        wait

  docker-build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
    - uses: actions/checkout@v6

    - name: Build Docker image
      run: docker build -f backend/Dockerfile ./backend
