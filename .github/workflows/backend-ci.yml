name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/testops"
      JWT_SECRET: "test-jwt-secret-must-be-at-least-32-chars-long"
      JWT_REFRESH_SECRET: "test-jwt-refresh-secret-must-be-at-least-32-chars-long"
      PORT: 3000

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Lint
      run: npm run lint

    - name: Typecheck
      run: npm run typecheck

    - name: Run tests
      run: npm test

  docker-build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
    - uses: actions/checkout@v6

    - name: Build Docker image
      run: docker build -f backend/Dockerfile ./backend
