name: Safe Update — Blast Radius

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  blast-radius:
    # Only run on Dependabot PRs
    if: startsWith(github.head_ref, 'dependabot/')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: "postgresql://postgres:password@localhost:5432/testops"
      JWT_SECRET: "test-jwt-secret-must-be-at-least-32-chars-long"
      JWT_REFRESH_SECRET: "test-jwt-refresh-secret-must-be-at-least-32-chars-long"
      PORT: 3000

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 2

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies (all workspaces)
      run: |
        npm ci
        cd backend && npm ci && cd ..
        cd frontend && npm ci && cd ..
        cd mcp-server && npm ci && cd ..

    - name: Generate Prisma Client
      working-directory: ./backend
      run: npx prisma generate

    - name: Run safe update verification
      id: safe_update
      run: node scripts/safe-update.js --skip-update --json > .safe-update-report.json 2>&1
      continue-on-error: true

    - name: Parse blast radius level
      id: blast_radius
      if: always()
      run: |
        if [ -f .safe-update-report.json ]; then
          LEVEL=$(node -e "
            try {
              const r = JSON.parse(require('fs').readFileSync('.safe-update-report.json','utf8'));
              console.log(r.level || 'unknown');
            } catch { console.log('unknown'); }
          ")
          SCORE=$(node -e "
            try {
              const r = JSON.parse(require('fs').readFileSync('.safe-update-report.json','utf8'));
              console.log(r.score || 0);
            } catch { console.log(0); }
          ")
          echo "level=${LEVEL}" >> $GITHUB_OUTPUT
          echo "score=${SCORE}" >> $GITHUB_OUTPUT
        else
          echo "level=unknown" >> $GITHUB_OUTPUT
          echo "score=0" >> $GITHUB_OUTPUT
        fi

    - name: Post blast radius PR comment
      if: always()
      uses: actions/github-script@v9
      with:
        script: |
          const fs = require('fs');
          let report = {};
          try {
            report = JSON.parse(fs.readFileSync('.safe-update-report.json', 'utf8'));
          } catch (e) {
            report = { level: 'unknown', score: 0, summary: 'Failed to generate report.' };
          }

          const levelEmoji = { low: '🟢', medium: '🟡', high: '🔴', unknown: '⚪' };
          const emoji = levelEmoji[report.level] || '⚪';

          let body = `## ${emoji} Blast Radius: **${(report.level || 'unknown').toUpperCase()}** (score: ${report.score || 0}/100)\n\n`;
          body += `${report.summary || ''}\n\n`;

          if (report.packageChanges && report.packageChanges.length > 0) {
            body += `### Package Changes\n`;
            for (const ws of report.packageChanges) {
              body += `\n**${ws.workspace}**:\n`;
              for (const p of ws.added || []) body += `- ➕ \`${p.name}@${p.version}\`\n`;
              for (const p of ws.removed || []) body += `- ➖ \`${p.name}@${p.version}\`\n`;
              for (const p of ws.updated || []) body += `- 🔄 \`${p.name}\`: ${p.from} → ${p.to}\n`;
            }
            body += '\n';
          }

          if (report.majorVersionBumps && report.majorVersionBumps.length > 0) {
            body += `### ⚠️ Major Version Bumps\n`;
            for (const b of report.majorVersionBumps) {
              body += `- \`${b.name}\`: ${b.from} → ${b.to} (${b.workspace})\n`;
            }
            body += '\n';
          }

          if (report.verificationResults && report.verificationResults.length > 0) {
            body += `### Verification Results\n`;
            for (const v of report.verificationResults) {
              body += `- ${v.passed ? '✅' : '❌'} **${v.step}** (${v.duration})\n`;
            }
            body += '\n';
          }

          if (report.correlations && report.correlations.length > 0) {
            body += `### Failure Correlations\n`;
            for (const c of report.correlations) {
              body += `- **${c.failingStep}** → likely caused by: ${c.likelyCauses.join(', ')} (confidence: ${c.confidence})\n`;
            }
            body += '\n';
          }

          body += `---\n*Generated by [safe-update.js](../blob/main/scripts/safe-update.js)*\n`;

          // Find and update existing comment, or create new one
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const marker = '## ' + emoji.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '|## 🟢|## 🟡|## 🔴|## ⚪';
          const botComment = comments.find(c =>
            c.user.type === 'Bot' && c.body.includes('Blast Radius')
          );

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
          }

    - name: Label PR with blast radius level
      if: always()
      uses: actions/github-script@v9
      with:
        script: |
          const level = '${{ steps.blast_radius.outputs.level }}';
          const label = `blast-radius:${level}`;

          const colors = {
            'blast-radius:low': '0e8a16',
            'blast-radius:medium': 'fbca04',
            'blast-radius:high': 'e11d48',
            'blast-radius:unknown': 'cccccc',
          };

          // Remove existing blast-radius labels
          const { data: labels } = await github.rest.issues.listLabelsOnIssue({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          for (const l of labels) {
            if (l.name.startsWith('blast-radius:')) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: l.name,
                });
              } catch { /* label may already be removed */ }
            }
          }

          // Ensure label exists
          try {
            await github.rest.issues.getLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: label,
            });
          } catch {
            await github.rest.issues.createLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: label,
              color: colors[label] || 'cccccc',
              description: `Dependency update blast radius: ${level}`,
            });
          }

          await github.rest.issues.addLabels({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            labels: [label],
          });

    - name: Fail if verification failed
      if: steps.safe_update.outcome == 'failure'
      run: |
        echo "::error::Safe update verification failed. See blast radius report in PR comment."
        exit 1

    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: safe-update-report
        path: .safe-update-report.json
        retention-days: 30
