name: Dependencies & Security

on:
  schedule:
    - cron: '0 0 * * 0'  # Run weekly
  workflow_dispatch:  # Allow manual trigger

jobs:
  dependencies:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Check for updates
      continue-on-error: true
      run: |
        npm install -g npm-check-updates
        cd backend && ncu > backend-updates.txt || echo "No updates available" > backend-updates.txt
        cd ../frontend && ncu > frontend-updates.txt || echo "No updates available" > frontend-updates.txt

    - name: Upload dependency check results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: dependency-updates
        path: |
          backend/backend-updates.txt
          frontend/frontend-updates.txt

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run npm audit (report)
      continue-on-error: true
      run: |
        echo "# Security Audit Results" > security-report.md
        echo "" >> security-report.md
        echo "## Backend npm audit" >> security-report.md
        echo '```' >> security-report.md
        (cd backend && npm audit 2>&1) >> security-report.md || true
        echo '```' >> security-report.md
        echo "" >> security-report.md
        echo "## Frontend npm audit" >> security-report.md
        echo '```' >> security-report.md
        (cd frontend && npm audit 2>&1) >> security-report.md || true
        echo '```' >> security-report.md

    - name: Fail on high-severity vulnerabilities
      run: |
        echo "Checking backend for high-severity vulnerabilities..."
        (cd backend && npm audit --audit-level=high)
        echo "Checking frontend for high-severity vulnerabilities..."
        (cd frontend && npm audit --audit-level=high)

    - name: Upload security report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: security-report
        path: security-report.md

  license-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Install backend dependencies
      working-directory: ./backend
      run: npm ci

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Install license checker
      run: npm install -g license-checker

    - name: Check licenses
      continue-on-error: true
      run: |
        (cd backend && license-checker --json) > backend-licenses.json || echo "{}" > backend-licenses.json
        (cd frontend && license-checker --json) > frontend-licenses.json || echo "{}" > frontend-licenses.json

    - name: Create License Report
      run: |
        echo "# License Report" > license-report.md
        echo "## Backend Dependencies" >> license-report.md
        echo '```json' >> license-report.md
        cat backend-licenses.json >> license-report.md || echo "No data" >> license-report.md
        echo '```' >> license-report.md
        echo "## Frontend Dependencies" >> license-report.md
        echo '```json' >> license-report.md
        cat frontend-licenses.json >> license-report.md || echo "No data" >> license-report.md
        echo '```' >> license-report.md

    - name: Upload License Report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: license-report
        path: license-report.md