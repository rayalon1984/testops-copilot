name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Get version from tag
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Extract release notes from CHANGELOG
      id: changelog
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"

        # Extract release notes from CHANGELOG.md for this version
        awk "/## \[${VERSION}\]/,/## \[/" CHANGELOG.md | \
          sed '/## \[/d' | \
          sed '/^$/d' | \
          head -n -1 > release_notes.txt

        # If no release notes found in CHANGELOG, generate from commits
        if [ ! -s release_notes.txt ]; then
          echo "**Changes in this release:**" > release_notes.txt
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> release_notes.txt
        fi

        # Save for next step
        cat release_notes.txt
        {
          echo "RELEASE_NOTES<<EOF"
          cat release_notes.txt
          echo "EOF"
        } >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        name: TestOps Companion v${{ steps.get_version.outputs.version }}
        body: |
          ## 🎉 TestOps Companion v${{ steps.get_version.outputs.version }}

          ${{ steps.changelog.outputs.RELEASE_NOTES }}

          ### 📦 Installation

          ```bash
          git clone https://github.com/${{ github.repository }}.git
          cd testops-companion
          git checkout v${{ steps.get_version.outputs.version }}
          npm run setup
          ```

          ### 🐳 Docker Images

          ```bash
          docker pull ghcr.io/${{ github.repository }}/backend:${{ steps.get_version.outputs.version }}
          docker pull ghcr.io/${{ github.repository }}/frontend:${{ steps.get_version.outputs.version }}
          ```

          ### 📖 Documentation

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/v${{ steps.get_version.outputs.version }}/CHANGELOG.md) for complete details.
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}
        generate_release_notes: true

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: release
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/backend:latest
          ghcr.io/${{ github.repository }}/backend:${{ needs.release.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/frontend:latest
          ghcr.io/${{ github.repository }}/frontend:${{ needs.release.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: release
    
    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build documentation
      run: npm run docs:build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/dist
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'docs: deploy documentation for v${{ needs.release.outputs.version }}'

  notify:
    name: Notify Release
    runs-on: ubuntu-latest
    needs: [release, docker, deploy]
    if: always()
    
    steps:
    - name: Notify Slack
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        fields: repo,message,commit,author,action,eventName,ref,workflow
        text: |
          Release v${{ needs.release.outputs.version }} has been published!
          
          Docker images:
          - ghcr.io/${{ github.repository }}/backend:${{ needs.release.outputs.version }}
          - ghcr.io/${{ github.repository }}/frontend:${{ needs.release.outputs.version }}
          
          Documentation: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}