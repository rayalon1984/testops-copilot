name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version from tag
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Extract release notes from CHANGELOG
      id: changelog
      run: |
        VERSION="${{ steps.get_version.outputs.version }}"

        # Extract release notes from CHANGELOG.md for this version
        awk "/## \[${VERSION}\]/,/## \[/" CHANGELOG.md | \
          sed '/## \[/d' | \
          sed '/^$/d' | \
          head -n -1 > release_notes.txt

        # If no release notes found in CHANGELOG, generate from commits
        if [ ! -s release_notes.txt ]; then
          echo "**Changes in this release:**" > release_notes.txt
          echo "" >> release_notes.txt
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=tformat:"- %s" "${PREV_TAG}..HEAD" >> release_notes.txt
          else
            git log --pretty=tformat:"- %s" HEAD >> release_notes.txt
          fi
        fi

        # Ensure file ends with a newline
        sed -i -e '$a\' release_notes.txt

        # Save for next step
        cat release_notes.txt
        # Use EOF delimiter with random suffix to avoid conflicts with content
        delimiter="ghadelimiter_$RANDOM"
        {
          echo "RELEASE_NOTES<<${delimiter}"
          cat release_notes.txt
          echo "${delimiter}"
        } >> $GITHUB_OUTPUT

    - name: Check if release already exists
      id: check_release
      run: |
        EXISTING=$(gh release view "v${{ steps.get_version.outputs.version }}" --json body --jq '.body' 2>/dev/null || echo "")
        if [ -n "$EXISTING" ] && ! echo "$EXISTING" | grep -q "Changes in this release"; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "Release already exists with custom notes — skipping overwrite"
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      if: steps.check_release.outputs.skip != 'true'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        name: TestOps Companion v${{ steps.get_version.outputs.version }}
        body: |
          ## 🎉 TestOps Companion v${{ steps.get_version.outputs.version }}

          ${{ steps.changelog.outputs.RELEASE_NOTES }}

          ### 📦 Installation

          ```bash
          git clone https://github.com/${{ github.repository }}.git
          cd testops-companion
          git checkout v${{ steps.get_version.outputs.version }}
          npm run setup
          ```

          ### 🐳 Docker Images

          ```bash
          docker pull ghcr.io/${{ github.repository }}/backend:${{ steps.get_version.outputs.version }}
          docker pull ghcr.io/${{ github.repository }}/frontend:${{ steps.get_version.outputs.version }}
          ```

          ### 📖 Documentation

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/v${{ steps.get_version.outputs.version }}/CHANGELOG.md) for complete details.
        draft: false
        prerelease: ${{ contains(steps.get_version.outputs.version, '-') }}

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: release

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/backend:latest
          ghcr.io/${{ github.repository }}/backend:${{ needs.release.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/frontend:latest
          ghcr.io/${{ github.repository }}/frontend:${{ needs.release.outputs.version }}
        cache-from: type=gha
        cache-to: type=gha,mode=max