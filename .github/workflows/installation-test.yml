name: Installation Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-docker-production-install:
    name: Test Docker Production Installation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Start Production Stack
        run: |
          # Use the new production compose file
          docker compose -f docker-compose.prod.yml up -d --build
          
          # Wait for services to be ready
          echo "Waiting for services to start..."
          sleep 30
          
      - name: Show running containers
        run: docker compose -f docker-compose.prod.yml ps

      - name: Check Backend Health
        run: |
          # Backend runs on port 3000 mapped to host
          echo "Checking backend health..."
          timeout 90s bash -c 'until curl -s http://localhost:3000/health | grep "ok"; do sleep 5; done'

      - name: Check Frontend Accessibility
        run: |
          # Frontend runs on port 80 mapped to host
          echo "Checking frontend availability..."
          curl --fail -I http://localhost:80

      - name: Verify Database Migrations
        run: |
          # Check if migrations tables exist in the DB container
          docker compose -f docker-compose.prod.yml exec -T db psql -U postgres -d testops -c "\dt" | grep "_prisma_migrations"

      - name: Print Container Logs
        if: failure()
        run: docker compose -f docker-compose.prod.yml logs backend db

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.prod.yml down -v

  test-demo-install:
    name: Test Demo Mode Installation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd backend && npm ci && cd ..
          cd frontend && npm ci && cd ..

      - name: Test demo mode setup
        run: |
          cd backend
          npm run dev:simple:setup

      - name: Verify demo database
        run: |
          cd backend
          test -f prisma/dev.db && echo "Demo database created successfully"

      - name: Type check (demo mode)
        run: |
          cd backend
          npm run typecheck
          cd ../frontend
          npm run typecheck

  test-docker-compose:
    name: Test Docker Compose Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start Docker Compose services
        run: |
          docker compose up -d db redis weaviate
          sleep 10

      - name: Check services health
        run: |
          docker compose ps
          docker compose exec -T db pg_isready -U postgres
          docker compose exec -T redis redis-cli ping

      - name: Verify Weaviate
        run: |
          curl --fail http://localhost:8081/v1/.well-known/ready || exit 1

      - name: Stop services
        run: |
          docker compose down -v

  validate-configuration:
    name: Validate Configuration Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check port consistency
        run: |
          # Check backend .env.example
          if ! grep -q "^PORT=3000" backend/.env.example; then
            echo "ERROR: Backend port should be 3000 in .env.example"
            exit 1
          fi

          # Check frontend .env.example
          if ! grep -q "VITE_API_URL=http://localhost:3000" frontend/.env.example; then
            echo "ERROR: Frontend API URL should point to port 3000"
            exit 1
          fi

          echo "✅ Port configuration is consistent"

      - name: Validate Prisma schema
        run: |
          cd backend

          # Check production schema datasource
          if ! head -20 prisma/schema.production.prisma | grep -q 'provider = "postgresql"'; then
            echo "ERROR: Production schema should use PostgreSQL"
            exit 1
          fi

          # Check dev schema datasource
          if ! head -20 prisma/schema.dev.prisma | grep -q 'provider = "sqlite"'; then
            echo "ERROR: Dev schema should use SQLite"
            exit 1
          fi

          echo "✅ Prisma schemas are correctly configured"

      - name: Check required files exist
        run: |
          required_files=(
            "QUICKSTART.md"
            "INSTALLATION_FIXES_SUMMARY.md"
            "INSTALLATION_ISSUES_REPORT.md"
            "RELEASE_NOTES_v2.5.6.md"
            "backend/prisma/schema.production.prisma"
            "backend/scripts/db-setup-fixed.js"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: Required file missing: $file"
              exit 1
            fi
          done

          echo "✅ All required files exist"

      - name: Validate setup scripts are executable
        run: |
          if [ ! -x "backend/scripts/db-setup-fixed.js" ]; then
            echo "ERROR: db-setup-fixed.js should be executable"
            exit 1
          fi

          echo "✅ Scripts are executable"
