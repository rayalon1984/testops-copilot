version: 2
updates:
  # Backend npm dependencies
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "rayalon1984"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      all-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      all-dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      major-updates:
        update-types:
          - "major"

  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    reviewers:
      - "rayalon1984"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      all-production:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      all-dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      major-updates:
        update-types:
          - "major"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(docker)"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore(docker)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "ci(deps)"
    groups:
      all-actions:
        patterns:
          - "*"
