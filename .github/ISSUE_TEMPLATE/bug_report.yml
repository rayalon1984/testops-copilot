name: Bug Report
description: Create a report to help us improve
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please provide as much information as possible to help us resolve the issue.

        **Break Once, Never Again** — Every bug fix must include a prevention step
        (test case, lint rule, CI check, type constraint, or validation).

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of TestOps Companion are you running?
      placeholder: e.g., v3.0.0
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Frontend
        - Backend
        - AI Subsystem
        - MCP Server
        - CI/CD Integration
        - Database
        - Infrastructure
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - "Critical — System down or data loss"
        - "High — Major feature broken, no workaround"
        - "Medium — Feature degraded, workaround exists"
        - "Low — Minor issue, cosmetic or edge case"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: When I... the system...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code.
      render: shell

  - type: textarea
    id: root-cause
    attributes:
      label: Root Cause (if known)
      description: |
        What is the underlying cause of this bug? Not just the symptom.
        (Fill this in during investigation, not necessarily at filing time.)
      placeholder: "The bug occurs because..."

  - type: textarea
    id: prevention
    attributes:
      label: Prevention Plan (Break Once, Never Again)
      description: |
        What guard will prevent this class of bug from recurring?
        Must be at least one of: test case, lint rule, CI check, type constraint, or validation.
        A fix without a prevention step is incomplete.
      placeholder: |
        - [ ] Add regression test in `backend/src/__tests__/...`
        - [ ] Add CI check for ...
        - [ ] Add Zod validation for ...

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide information about your environment
      value: |
        - OS: [e.g., Ubuntu 22.04]
        - Browser: [e.g., Chrome 112]
        - Node.js version: [e.g., 18.16.0]
        - Docker version: [e.g., 20.10.21]

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: I have searched for similar issues before creating this one
          required: true
        - label: I understand the fix must include a prevention step (test, lint rule, CI check, etc.)
          required: true
