services:
  frontend:
    build:
      context: ./frontend
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:4000
      - VITE_WEBSOCKET_URL=ws://localhost:4000
    depends_on:
      - backend
    networks:
      - testops-network

  backend:
    build:
      context: ./backend
      target: development
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/testops
      - JWT_SECRET=your_jwt_secret_here
      - SLACK_WEBHOOK_URL=your_slack_webhook_here
      - JENKINS_URL=your_jenkins_url_here
      - JENKINS_USERNAME=your_jenkins_username
      - JENKINS_TOKEN=your_jenkins_token
    depends_on:
      - db
    networks:
      - testops-network

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=testops
    networks:
      - testops-network

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - testops-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - testops-network

  weaviate:
    image: semitechnologies/weaviate:latest
    ports:
      - "8081:8080"  # Using 8081 as 8080 is taken by adminer
    environment:
      - QUERY_DEFAULTS_LIMIT=20
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - ENABLE_MODULES=
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - testops-network

volumes:
  postgres_data:
  redis_data:
  weaviate_data:

networks:
  testops-network:
    driver: bridge